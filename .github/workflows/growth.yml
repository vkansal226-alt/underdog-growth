name: growth-loop

# Runs the Underdog Goods growth loop on GitHub's runners (open internet egress,
# so Zernio + Supabase are reachable — unlike Anthropic's sandboxed cloud env).
# ASSIST mode: measures, then auto-SCHEDULES fresh marketing for proven winners
# (designs with demand signal). New-design generation and cuts stay surfaced-only
# (need --confirm) — only the publish-winning-designs step runs unattended.

on:
  schedule:
    - cron: "0 13 */2 * *"   # every 2 days at 13:00 UTC (9am America/New_York, EDT)
  workflow_dispatch: {}       # manual "Run workflow" button / gh workflow run

permissions:
  contents: write             # to commit ledger/log/state back to the repo

concurrency:
  group: growth-loop
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run growth cycle (assist mode)
        env:
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          GROWTH_MODE: assist
        run: |
          if [ -z "$ZERNIO_API_KEY" ]; then
            echo "::error::ZERNIO_API_KEY secret is not set on the repo"; exit 1
          fi
          bash cloud/run.sh

      - name: Persist state (ledger / log / perf)
        run: |
          git config user.name  "growth-bot"
          git config user.email "growth-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no state changes this cycle"
          else
            git commit -m "growth: automated cycle $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
