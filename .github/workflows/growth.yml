name: growth-loop

# Runs the Underdog Goods growth loop on GitHub's runners (open internet egress,
# so Zernio + Supabase are reachable — unlike Anthropic's sandboxed cloud env).
# Modes (GROWTH_MODE env below):
#   assist - measure + auto-schedule marketing for proven winners (current).
#   auto   - additionally author brand-new designs (Claude), render (Recraft),
#            vet with a vision critic, and publish survivors to the storefront.
#            Requires the ANTHROPIC/RECRAFT secrets + WALNUT_DEPLOY_KEY (write
#            access to the walnut storefront repo). Cuts always stay surfaced-only.

on:
  schedule:
    - cron: "0 13 */2 * *"   # every 2 days at 13:00 UTC (9am America/New_York, EDT)
  workflow_dispatch: {}       # manual "Run workflow" button / gh workflow run

permissions:
  contents: write             # to commit ledger/log/state back to the repo

concurrency:
  group: growth-loop
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image toolchain (auto mode)
        run: |
          python -m pip install --quiet Pillow
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-liberation

      - name: Run growth cycle
        env:
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RECRAFT_API_KEY: ${{ secrets.RECRAFT_API_KEY }}
          WALNUT_DEPLOY_KEY: ${{ secrets.WALNUT_DEPLOY_KEY }}
          GROWTH_MODE: assist   # flip to "auto" after WALNUT_DEPLOY_KEY is set + one watched cycle passes
        run: |
          if [ -z "$ZERNIO_API_KEY" ]; then
            echo "::error::ZERNIO_API_KEY secret is not set on the repo"; exit 1
          fi
          bash cloud/run.sh

      - name: Persist state (ledger / log / perf)
        run: |
          git config user.name  "growth-bot"
          git config user.email "growth-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no state changes this cycle"
          else
            git commit -m "growth: automated cycle $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
